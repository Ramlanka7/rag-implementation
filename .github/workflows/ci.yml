name: CI – Build & Test

on:
  push:
    branches:
      - dev
  pull_request:
    branches:
      - dev

jobs:
  build-and-test:
    name: Build and Test (.NET 10)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore rag-implementation.sln

      - name: Build solution
        run: dotnet build rag-implementation.sln --no-restore --configuration Release

      - name: Run tests
        run: dotnet test rag-implementation.sln --no-build --configuration Release --verbosity normal
